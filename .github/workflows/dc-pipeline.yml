name: DC Pipeline (SS2-SS5)

on:
  schedule:
    - cron: "41 5 * * *"      # daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dc-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.4.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run SS2-SS5 pipeline
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DC_SPREADSHEET_ID: ${{ secrets.DC_SPREADSHEET_ID }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          DATA_GOV_IN_API_KEY: ${{ secrets.DATA_GOV_IN_API_KEY }}
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: |
          set -o pipefail
          python dc_pipeline.py 2>&1 | tee run.log

      - name: Commit MCA cache
        run: |
          git config user.name  "dc-engine-bot"
          git config user.email "dc-engine-bot@users.noreply.github.com"
          git add mca_cache.json
          if git diff --staged --quiet; then
            echo "No MCA cache change."
          else
            git commit -m "Update MCA cache [skip ci]"
            git pull --rebase && git push
          fi
